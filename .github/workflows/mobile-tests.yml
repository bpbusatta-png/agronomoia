name: Mobile tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  jest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/app-campo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: mobile/app-campo/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Checagem de tipos (tsc)
        run: npx tsc --noEmit

      - name: Rodar testes (Jest)
        run: npm test
