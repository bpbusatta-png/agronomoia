services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: agronomo
      POSTGRES_PASSWORD: agronomo
      POSTGRES_DB: agronomo_ia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

volumes:
  pgdata:
